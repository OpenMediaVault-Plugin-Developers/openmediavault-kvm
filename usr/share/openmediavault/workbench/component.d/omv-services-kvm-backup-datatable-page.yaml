version: "1.0"
type: component
data:
  name: omv-services-kvm-backup-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    stateId: 1341c5ac-8e67-11ec-bba9-672ebede14ed
    store:
      proxy:
        service: Kvm
        get:
          method: getBackupList
    columns:
      - name: _("UUID")
        prop: uuid
        flexGrow: 1
        sortable: true
        hidden: true
      - name: _("VM Name")
        prop: vmname
        flexGrow: 1
        sortable: true
      - name: _("Date")
        prop: date
        flexGrow: 2
        sortable: true
      - name: _("Path")
        prop: path
        flexGrow: 3
        sortable: true
      - name: _("Space Used")
        prop: used
        flexGrow: 1
        sortable: true
        cellTemplateName: binaryUnit
    actions:
      - type: iconButton
        tooltip: _("Backup")
        icon: mdi:play-box-outline
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("Execute backup using selected VM name and path ...")
              startOnInit: false
              showCompletion: false
              request:
                service: Kvm
                method: doBackup
                params:
                  compression: false
                  path: "{{ _selected[0].path }}"
                  vmname: "{{ _selected[0].vmname }}"
      - type: iconButton
        tooltip: _("Backup with Compression")
        icon: mdi:play-box
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("Execute backup with compression using selected VM name and path ...")
              startOnInit: false
              showCompletion: false
              request:
                service: Kvm
                method: doBackup
                params:
                  compression: true
                  path: "{{ _selected[0].path }}"
                  vmname: "{{ _selected[0].vmname }}"
      - type: iconButton
        tooltip: _("Incremental Backup")
        icon: mdi:playlist-plus
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("Execute incremental backup using selected VM name and path ...")
              startOnInit: false
              showCompletion: false
              request:
                service: Kvm
                method: doBackup
                params:
                  compression: false
                  incremental: true
                  path: "{{ _selected[0].path }}"
                  vmname: "{{ _selected[0].vmname }}"
      - type: iconButton
        tooltip: _("Restore")
        icon: mdi:restore
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: formDialog
          formDialog:
            title: _("Restore VM ...")
            fields:
              - type: textInput
                name: backup
                label: _("Backup")
                readonly: true
                value: "{{ _selected[0].vmname }} | {{ _selected[0].date }} | {{ _selected[0].path }}"
              - type: textInput
                name: newname
                label: _("VM name")
                value: ""
                hint: _("VM name for restored VM")
              - type: select
                name: pool
                label: _('Pool')
                textField: name
                valueField: path
                store:
                  proxy:
                    service: Kvm
                    get:
                      method: enumeratePools
                hint: _("Optional. Choose pool to restore VM to a different location. Leave blank for original location.")
            buttons:
              submit:
                text: _("Restore")
                execute:
                  type: taskDialog
                  taskDialog:
                    config:
                      title: _("Restore VM ...")
                      startOnInit: true
                      request:
                        service: Kvm
                        method: doRestore
                        params:
                          backup: "{{ backup }}"
                          newname: "{{ newname }}"
                          newpath: "{{ pool }}"
      - template: delete
        execute:
          type: request
          request:
            service: Kvm
            method: deleteBackup
            params:
              date: "{{ _selected[0].date }}"
              path: "{{ _selected[0].path }}"
              uuid: "{{ _selected[0].uuid }}"
              vmname: "{{ _selected[0].vmname }}"
